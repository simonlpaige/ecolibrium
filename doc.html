<style>
html { scroll-behavior: smooth; }
:focus-visible { outline: 2px solid var(--clay); outline-offset: 3px; border-radius: 2px; }

body { line-height: 1.7; }
a { color: var(--moss-deep); text-decoration: underline; text-underline-offset: 2px; }
a:hover { color: var(--clay); }

.skip-link {
  position: absolute; top: -100px; left: 16px;
  background: var(--moss); color: var(--paper);
  padding: 8px 16px; font-weight: 600; font-size: 14px; z-index: 200;
  text-decoration: none; transition: top 0.15s;
}
.skip-link:focus { top: 0; outline: 3px solid var(--clay); }

/* Nav */
.site-nav {
  position: sticky; top: 0; z-index: 100;
  background: color-mix(in oklab, var(--paper) 88%, transparent);
  backdrop-filter: blur(8px);
  border-bottom: var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px clamp(20px, 4vw, 40px); gap: var(--s-5);
}
.nav-mark a { display: block; line-height: 0; text-decoration: none; }
.nav-mark svg { display: block; height: 32px; width: auto; }
.nav-links { display: flex; align-items: center; gap: var(--s-5); }
.nav-links a {
  font-family: var(--f-mono); font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-muted); text-decoration: none;
  padding: 4px 0; border-bottom: 1px solid transparent;
  transition: color 0.18s, border-bottom-color 0.18s;
}
.nav-links a:hover, .nav-links a.active { color: var(--moss-deep); border-bottom-color: var(--clay); }

/* Breadcrumb */
.breadcrumb {
  max-width: 920px; margin: 0 auto;
  padding: var(--s-5) clamp(20px, 4vw, 40px) 0;
  font-family: var(--f-mono); font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.breadcrumb a { color: var(--ink-muted); text-decoration: none; }
.breadcrumb a:hover { color: var(--clay); text-decoration: underline; }

/* Main layout */
main {
  max-width: 920px; margin: 0 auto;
  padding: var(--s-5) clamp(20px, 4vw, 40px) var(--s-9);
}

/* Loading / error */
#loading {
  text-align: center; padding: var(--s-9) var(--s-5);
  color: var(--ink-muted); font-size: 15px;
  font-family: var(--f-mono); letter-spacing: 0.06em;
}
.error-box {
  background: color-mix(in oklab, var(--paper-2) 50%, var(--paper));
  border: var(--rule-soft); border-left: 3px solid var(--clay);
  padding: var(--s-5); margin: var(--s-7) 0;
}
.error-box h2 { color: var(--ink); margin-bottom: var(--s-3); font-size: 22px; font-style: italic; }
.error-box p { color: var(--ink-soft); font-size: 14px; }

/* Markdown content */
#content h1 {
  font-family: var(--f-display); font-style: italic;
  font-size: clamp(36px, 5vw, 64px); font-weight: 400;
  line-height: 0.98; letter-spacing: -0.02em;
  color: var(--ink); margin-bottom: var(--s-5); margin-top: 0;
  padding-bottom: var(--s-4); border-bottom: var(--rule);
  max-width: 22ch;
}
#content h2 {
  font-family: var(--f-display); font-style: italic;
  font-size: clamp(24px, 3vw, 36px); font-weight: 400;
  color: var(--moss-deep); margin: var(--s-7) 0 var(--s-4);
  padding-bottom: var(--s-2); border-bottom: var(--rule-soft);
}
#content h3 {
  font-family: var(--f-display); font-style: italic;
  font-size: 22px; font-weight: 400;
  color: var(--ink); margin: var(--s-6) 0 var(--s-3);
}
#content h4 {
  font-family: var(--f-mono); font-size: 11px; font-weight: 500;
  color: var(--ink-muted); margin: var(--s-5) 0 var(--s-2);
  text-transform: uppercase; letter-spacing: 0.14em;
}
#content p {
  color: var(--ink-soft); margin-bottom: var(--s-4);
  font-size: 17px; line-height: 1.7; max-width: 64ch;
}
#content p strong { color: var(--ink); font-weight: 600; }
#content p em { color: var(--moss-deep); font-style: italic; }
#content a { color: var(--moss-deep); }
#content a:hover { color: var(--clay); }

#content ul, #content ol { margin: 0 0 var(--s-4) 0; padding-left: var(--s-5); }
#content li {
  color: var(--ink-soft); font-size: 16px;
  line-height: 1.7; margin-bottom: 6px; max-width: 64ch;
}
#content li strong { color: var(--ink); }
#content li > ul, #content li > ol { margin: 8px 0 4px; }
#content input[type="checkbox"] { accent-color: var(--moss); margin-right: 6px; }

#content blockquote {
  border-left: 3px solid var(--clay);
  background: color-mix(in oklab, var(--paper-2) 50%, var(--paper));
  margin: var(--s-5) 0; padding: var(--s-4) var(--s-5);
}
#content blockquote p {
  color: var(--ink-soft); font-style: italic;
  margin-bottom: 0; font-size: 17px;
  font-family: var(--f-display);
}

#content code {
  background: var(--paper-2); border: var(--rule-soft);
  padding: 1px 6px; font-size: 14px;
  color: var(--moss-deep);
  font-family: var(--f-mono);
}
#content pre {
  background: var(--ink); color: var(--paper);
  border: var(--rule);
  padding: var(--s-5); overflow-x: auto;
  margin: var(--s-5) 0;
}
#content pre code {
  background: none; border: none; padding: 0;
  font-size: 13px; line-height: 1.6;
  color: var(--paper); font-family: var(--f-mono);
}

.table-wrap {
  width: 100%; overflow-x: auto;
  margin: var(--s-5) 0; border: var(--rule-soft);
  -webkit-overflow-scrolling: touch;
}
#content table {
  width: 100%; border-collapse: collapse;
  font-size: 14px; min-width: 500px;
}
#content thead { background: color-mix(in oklab, var(--paper-2) 60%, var(--paper)); }
#content th {
  padding: 10px 14px; text-align: left;
  font-family: var(--f-mono); font-size: 10px;
  font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted); border-bottom: var(--rule-soft);
  white-space: nowrap;
}
#content td {
  padding: 10px 14px; color: var(--ink-soft);
  border-bottom: var(--rule-soft);
  vertical-align: top; line-height: 1.55;
}
#content tr:last-child td { border-bottom: none; }
#content tr:hover td { background: color-mix(in oklab, var(--paper-2) 40%, var(--paper)); }
#content td strong { color: var(--ink); }
#content td a { color: var(--moss-deep); font-size: 13px; }

#content hr { border: none; border-top: var(--rule-soft); margin: var(--s-7) 0; }
#content img { max-width: 100%; }

/* TOC */
.doc-layout {
  display: flex; gap: var(--s-7); align-items: flex-start;
  max-width: 1180px; margin: 0 auto;
  padding: 0 clamp(20px, 4vw, 40px);
}
.doc-layout main { padding-left: 0; padding-right: 0; max-width: 720px; }

#toc {
  position: sticky; top: 80px;
  width: 220px; min-width: 220px;
  max-height: calc(100vh - 100px);
  overflow-y: auto; flex-shrink: 0;
  padding: var(--s-5) 0 var(--s-5);
  scrollbar-width: thin;
}
#toc::-webkit-scrollbar { width: 4px; }
#toc::-webkit-scrollbar-thumb { background: var(--paper-3); }

#toc h2 {
  font-family: var(--f-mono); font-size: 10px;
  font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.16em; color: var(--ink-muted);
  margin-bottom: var(--s-3); padding-bottom: 0;
  border-bottom: none; margin-top: 0;
}
#toc ul { list-style: none; padding: 0; margin: 0; }
#toc li { margin: 0; }
#toc a {
  display: block; padding: 5px 10px;
  font-size: 13px; color: var(--ink-soft);
  border-left: 1px solid var(--paper-3);
  text-decoration: none; line-height: 1.45;
  transition: color 0.15s, border-color 0.15s;
}
#toc a:hover { color: var(--moss-deep); border-left-color: var(--moss); }
#toc a.toc-h3 { padding-left: 22px; font-size: 12px; color: var(--ink-muted); }
#toc a.toc-active { color: var(--clay); border-left-color: var(--clay); font-style: italic; }

/* Doc nav */
.doc-nav {
  display: flex; justify-content: space-between; flex-wrap: wrap;
  gap: var(--s-3); margin-top: var(--s-7); padding-top: var(--s-5);
  border-top: var(--rule);
}
.doc-nav a {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 18px;
  border: 1px solid var(--ink); background: transparent;
  font-family: var(--f-mono); font-size: 11px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink); text-decoration: none;
  transition: background 0.18s, color 0.18s;
}
.doc-nav a:hover { background: var(--moss); color: var(--paper); border-color: var(--moss); }

/* Footer */
.site-foot {
  border-top: var(--rule);
  padding: var(--s-5) clamp(20px, 4vw, 40px); text-align: center;
  font-family: var(--f-mono); font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--ink-muted);
}
.site-foot a { color: var(--ink-muted); }
.site-foot a:hover { color: var(--moss-deep); }

@media (max-width: 900px) {
  #toc { display: none; }
  .doc-layout { display: block; }
}
@media (max-width: 600px) {
  .nav-links a:not(.active) { display: none; }
  #content h1 { font-size: 32px; }
  #content h2 { font-size: 22px; }
  #content p, #content li { font-size: 15px; }
}

@media print {
  .site-nav, .breadcrumb, #toc, .doc-nav, .site-foot { display: none; }
  body { background: white; color: black; font-size: 12pt; }
  #content h1, #content h2, #content h3 { color: black; }
  #content p, #content li { color: #333; }
  a::after { content: " (" attr(href) ")"; font-size: 10pt; color: #666; }
}
</style>

<script>
// ── Doc registry ──
const DOCS = {
  README: { title: "Project Overview", prev: null, next: "DEEP-DIVE" },
  DIRECTORY:    { title: "Organization Directory",  prev: "README",       next: "DEEP-DIVE" },
  "DEEP-DIVE":  { title: "Deep Research",           prev: "DIRECTORY",    next: "GOVERNANCE" },
  GOVERNANCE:   { title: "Governance",              prev: "DEEP-DIVE",    next: "SUSTAINABILITY" },
  SUSTAINABILITY:{ title: "Sustainability",         prev: "GOVERNANCE",   next: "WISEREARTH" },
  WISEREARTH:   { title: "WiserEarth Analysis",     prev: "SUSTAINABILITY",next: "MULTILINGUAL-TERMS" },
  "MULTILINGUAL-TERMS": { title: "Multilingual Terms Bank", prev: "WISEREARTH",         next: "OPENCOOP-RESEARCH" },
  "OPENCOOP-RESEARCH":  { title: "Open.coop and Trust Layer", prev: "MULTILINGUAL-TERMS", next: "BOT-CRITIQUE" },
  "BOT-CRITIQUE":       { title: "Bot Pipeline Critique", prev: "OPENCOOP-RESEARCH",     next: null },
};

// ── Parse query param ──
const params = new URLSearchParams(location.search);
const file = params.get("file") || "README";
const meta = DOCS[file] || { title: file, prev: null, next: null };

// Set page title
document.title = `${meta.title} | Commonweave`;

// Breadcrumb
document.getElementById("breadcrumb-current").textContent = meta.title;

// Highlight nav
const navEl = document.getElementById("nav-" + file.toLowerCase().replace(/-/g,""));
if (navEl) navEl.setAttribute("aria-current", "page");

// Mark active nav link
document.querySelectorAll(".nav-links a").forEach(a => {
  if (a.href.includes(file)) a.setAttribute("aria-current", "page");
});

// ── Fetch and render ──
const mdUrl = `./${file}.md`;

marked.setOptions({
  gfm: true,
  breaks: false,
});

// Custom renderer: wrap tables
const renderer = new marked.Renderer();
renderer.table = function(header, body) {
  return `<div class="table-wrap" role="region" aria-label="Data table" tabindex="0"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
};
// Open external links in new tab
renderer.link = function(href, title, text) {
  const isExternal = href && (href.startsWith("http") || href.startsWith("//"));
  const attrs = isExternal
    ? ` target="_blank" rel="noopener noreferrer" aria-label="${text}${title ? ': ' + title : ''} (opens in new tab)"`
    : ``;
  const titleAttr = title ? ` title="${title}"` : "";
  return `<a href="${href}"${titleAttr}${attrs}>${text}</a>`;
};

marked.use({ renderer });

fetch(mdUrl)
  .then(r => {
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.text();
  })
  .then(md => {
    document.getElementById("loading").style.display = "none";
    const contentEl = document.getElementById("content");
    contentEl.innerHTML = marked.parse(md);

    // Fix checkbox inputs -- mark readonly for ADA
    contentEl.querySelectorAll("input[type=checkbox]").forEach(cb => {
      cb.setAttribute("readonly", "");
      cb.setAttribute("aria-readonly", "true");
      cb.setAttribute("tabindex", "-1");
    });

    // GitHub-compatible slug -- matches anchors already in DIRECTORY.md etc.
    function ghSlug(text) {
      return text.toLowerCase()
        .replace(/[^\w\s-]/g, "")   // strip punctuation except hyphens
        .trim()
        .replace(/\s+/g, "-");       // spaces to hyphens (no collapse -- GH keeps doubles)
    }
    // But GH actually does: keep spaces as -, strip all non-alphanumeric except - and space
    // More precisely: lowercase, strip anything not [a-z0-9 -], collapse spaces to single -
    function githubSlug(rawText) {
      return rawText
        .toLowerCase()
        .replace(/[^\w\s-]/g, "")   // remove punctuation (& . , ! etc.)
        .replace(/\s+/g, "-")       // spaces -> hyphens
        .replace(/-{2,}/g, "-")     // DIRECTORY.md uses -- for & so preserve that
    }
    // Actually GH preserves runs: '& ' -> ' ' -> '-', '--' stays '--' because it's already hyphens
    // The real GH algorithm: keep [a-z0-9 \-], spaces to -, no collapsing
    function slug(rawText) {
      return rawText
        .toLowerCase()
        .replace(/[^\w\s-]/g, "")   // strip non-word chars (removes & . etc.)
        .replace(/ +/g, "-");        // single spaces to hyphens (runs of spaces collapse)
    }

    // Assign IDs using GH-compatible slug
    const slugCounts = {};
    contentEl.querySelectorAll("h1,h2,h3,h4").forEach(h => {
      if (!h.id) {
        let base = slug(h.textContent);
        // deduplicate
        if (slugCounts[base] === undefined) {
          slugCounts[base] = 0;
          h.id = base;
        } else {
          slugCounts[base]++;
          h.id = base + "-" + slugCounts[base];
        }
      }
      h.setAttribute("tabindex", "-1"); // allow focus for skip links
    });

    // Fix in-document anchor links to use the same slugs
    contentEl.querySelectorAll('a[href^="#"]').forEach(a => {
      const target = a.getAttribute("href").slice(1);
      // If the target element exists by ID, it's fine; else try slugging the href text
      if (!document.getElementById(target)) {
        const fixed = slug(decodeURIComponent(target).replace(/-/g, " "));
        if (document.getElementById(fixed)) a.setAttribute("href", "#" + fixed);
      }
    });

    // Build TOC
    buildTOC(contentEl);

    // Doc nav
    buildDocNav();

    // Scroll spy
    initScrollSpy();
  })
  .catch(err => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").innerHTML = `
      <div class="error-box" role="alert">
        <h2>Document not found</h2>
        <p>Could not load <code>${file}.md</code>. ${err.message}</p>
        <p style="margin-top:12px"><a href="/commonweave/">Back to home</a></p>
      </div>`;
  });

// ── Build TOC ──
function buildTOC(contentEl) {
  // Skip headings that are in-document TOC sections ("Table of Contents", "Contents")
  const TOC_SKIP = /^(table of contents|contents)$/i;
  const headings = [...contentEl.querySelectorAll("h2, h3")].filter(
    h => !TOC_SKIP.test(h.textContent.trim())
  );
  if (headings.length < 3) { document.getElementById("toc").style.display = "none"; return; }
  const list = document.getElementById("toc-list");
  headings.forEach(h => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = "#" + h.id;
    a.textContent = h.textContent.trim();
    a.className = h.tagName === "H3" ? "toc-h3" : "toc-h2";
    a.addEventListener("click", e => {
      e.preventDefault();
      h.focus();
      h.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    li.appendChild(a);
    list.appendChild(li);
  });
}

// ── Build doc nav (prev/next) ──
function buildDocNav() {
  const nav = document.getElementById("doc-nav");
  const items = [];
  if (meta.prev) {
    const p = DOCS[meta.prev];
    items.push(`<a href="doc.html?file=${meta.prev}" aria-label="Previous document: ${p.title}">&larr; ${p.title}</a>`);
  }
  if (meta.next) {
    const n = DOCS[meta.next];
    items.push(`<a href="doc.html?file=${meta.next}" aria-label="Next document: ${n.title}">${n.title} &rarr;</a>`);
  }
  if (items.length) {
    nav.innerHTML = items.join("");
    nav.style.display = "flex";
  }
}

// ── Scroll spy for TOC ──
function initScrollSpy() {
  const headings = [...document.getElementById("content").querySelectorAll("h2,h3")];
  if (!headings.length) return;
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const id = entry.target.id;
      const link = document.querySelector(`#toc-list a[href="#${id}"]`);
      if (!link) return;
      if (entry.isIntersecting) {
        document.querySelectorAll("#toc-list a").forEach(a => a.classList.remove("toc-active"));
        link.classList.add("toc-active");
      }
    });
  }, { rootMargin: "-20% 0px -70% 0px" });
  headings.forEach(h => observer.observe(h));
}
</script>
