# REGISTRIES.yaml
#
# Canonical catalog of every country's national legal-entity / nonprofit /
# charity registry that Commonweave knows about. Sourced from
# NEW-WAVE-RESEARCH-SOURCE.md (the "new wave" research doc) and the
# strategic plan in NEW-WAVE-INGEST-PLAN.md, both written 2026-04-25.
#
# This file is the place to record what we know about each country's
# drawer: the registrar, the search URL, what entity classes it exposes,
# update frequency, and whether the URL was confirmed reachable. It
# replaces the scattered notes that used to live in ingester docstrings.
#
# Schema per entry:
#   country_code:  ISO 3166-1 alpha-2.
#   country_name:  human-readable.
#   registrar:     organization that owns the registry.
#   registry_name: name of the registry as the registrar uses it.
#   url:           canonical public search or bulk-download URL. null if
#                  no confirmed public portal (then notes explain).
#   bulk_data_url: bulk file URL when published. null if not bulk-able.
#   languages:     ISO 639-1 codes.
#   entity_classes_in_scope: kinds of entity searchable here that map to
#                  Commonweave-aligned legal forms (charity, nonprofit,
#                  community company, association, foundation, cooperative,
#                  etc).
#   api:           true if a documented API exists.
#   bulk_csv:      true if a bulk CSV / dataset download exists.
#   auth_required: true if login or paid access blocks public reads.
#   update_frequency: 'real_time' | 'daily' | 'weekly' | 'monthly' |
#                     'quarterly' | 'annually' | 'periodic' | 'unknown'.
#   last_checked:  ISO date when a human or this script last verified URL.
#   notes:         anything else worth knowing.
#   wave_a_target: true if this brief covers it (AU, BG, BR for Wave A's
#                  first three).
#
# Today this file lists the 17 Wave A countries plus the ~10 other
# confirmed-reachable national portals named in the new wave doc. Wave B
# and Wave C will extend it. We are not trying to enumerate all ~190
# jurisdictions in one sitting.

registries:

  # ── Wave A: the three this brief actually ingests ─────────────────────

  - country_code: AU
    country_name: Australia
    registrar: Australian Charities and Not-for-profits Commission
    registry_name: ACNC Charity Register
    url: https://www.acnc.gov.au/charity
    bulk_data_url: https://data.gov.au/dataset/ds-dga-b050b242-4487-4306-abf5-07ca073e5594
    languages: [en]
    entity_classes_in_scope:
      - registered_charity
      - public_benevolent_institution
      - health_promotion_charity
      - charitable_purpose_advancement_of_education
      - charitable_purpose_advancement_of_health
      - charitable_purpose_advancement_of_social_or_public_welfare
    api: true
    bulk_csv: true
    auth_required: false
    update_frequency: monthly
    last_checked: 2026-04-25
    notes: National charity register. Quarterly/monthly CSV dump on data.gov.au; also has a public REST API at acnc-public-api.azure-api.net. Around 70k registered charities.
    wave_a_target: true

  - country_code: BG
    country_name: Bulgaria
    registrar: Registry Agency (Агенция по вписванията)
    registry_name: Register of Non-profit Legal Entities (Регистър на юридическите лица с нестопанска цел)
    url: https://portal.registryagency.bg/
    bulk_data_url: null
    languages: [bg]
    entity_classes_in_scope:
      - non_profit_legal_entity
      - association
      - foundation
      - chitalishte
    api: false
    bulk_csv: false
    auth_required: false
    update_frequency: periodic
    last_checked: 2026-04-25
    notes: Commercial Register and Register of NPOs are integrated under one portal. Public search exists in Bulgarian (Cyrillic). Bulk export availability is uncertain. Wikidata SPARQL fallback for instance-of nonprofit organization (Q163740) + country (Q219) gives a smaller but reliable set.
    wave_a_target: true

  - country_code: BR
    country_name: Brazil
    registrar: IPEA (Instituto de Pesquisa Econômica Aplicada) and Receita Federal
    registry_name: Mapa das Organizações da Sociedade Civil (OSCs) and CNPJ public bulk data
    url: https://mapaosc.ipea.gov.br/
    bulk_data_url: https://mapaosc.ipea.gov.br/
    languages: [pt]
    entity_classes_in_scope:
      - organizacao_da_sociedade_civil
      - associacao_privada
      - fundacao_privada
      - cooperativa
    api: true
    bulk_csv: true
    auth_required: false
    update_frequency: annually
    last_checked: 2026-04-25
    notes: Mapa das OSCs has ~860k organizations of the social-civil-society universe with CNAE activity codes. CNPJ legal-form codes include 3220 (Associação Privada), 3999 (Outras Fundações), 2143 (Cooperativa). Pre-filter by purpose / CNAE so we do not pull HOAs and religious-only associations. Aim for 30-60k aligned rows.
    wave_a_target: true

